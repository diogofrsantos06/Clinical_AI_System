name: CI-CD Backend Pipeline

on:
  #push:
    #branches:
    #  - main
    #paths:
    #  - 'backend/**'
    
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      REGISTRY: git.ulscoimbra.min-saude.pt
      REG_NAME: ${{ github.repository_owner }} # public ou  ${{ github.repository_owner }}
      IMAGE_NAME: clinical-ai-system-backend
      #HELM_CHART_DIR: deploy/helm
      #K8S_NAMESPACE: teses-26
      VALUES_FILE: deploy/helm/values.yaml
    
    steps:
      - name: Validate inputs
        run: |
          if [ -z "${{ secrets.READ_WRITE_PACKAGES }}" ]; then
            echo "Error: Missing READ_WRITE_PACKAGES token"
            exit 1
          fi

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get latest version from registry
        id: get_version
        shell: bash
        run: |
          TAGS_JSON=$(curl -fsSL \
            -u "${{ github.actor }}:${{ secrets.READ_WRITE_PACKAGES }}" \
            "https://${{ env.REGISTRY }}/v2/${{ env.REG_NAME }}/${{ env.IMAGE_NAME }}/tags/list")
      
          echo "$TAGS_JSON" | jq .
      
          LATEST_VERSION=$(
            echo "$TAGS_JSON" \
            | jq -r '.tags[]?' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's/^v//' \
            | sort -V \
            | tail -n 1
          )
      
          if [ -z "$LATEST_VERSION" ]; then
            echo "No backend semantic version tags found"
            LATEST_VERSION="0.0.0"
          fi
      
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest backend version: v$LATEST_VERSION"


      - name: Calculate next patch version
        id: new_version
        shell: bash
        run: |
          CURRENT="${{ steps.get_version.outputs.latest_version }}"
      
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
      
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next backend version: $NEXT_VERSION"

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.READ_WRITE_PACKAGES }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REG_NAME }}/${{ env.IMAGE_NAME }}:${{ steps.new_version.outputs.next_version }}


      - name: Install yq
        shell: bash
        run: |
          # Set your platform variables (adjust as needed)
          VERSION=v4.2.0
          PLATFORM=linux_amd64

          # Download compressed binary
          wget https://github.com/mikefarah/yq/releases/download/${VERSION}/yq_${PLATFORM}.tar.gz -O - |\
            tar xz && sudo mv yq_${PLATFORM} /usr/local/bin/yq

      - name: Update Helm chart with new image tags
        run: |
          # Atualiza o values.yaml com a nova tag
          yq eval -i '
            .backend.image.tag = "${{ steps.new_version.outputs.next_version }}"
          ' $VALUES_FILE

          # Verifica as alterações
          cat $VALUES_FILE

      - name: Commit and push Helm chart changes
        run: |
          git config --local user.name "Gitea Actions"
          git config --local user.email "actions@gitea.ulscoimbra.min-saude.pt"
          git add $VALUES_FILE
          git commit -m "CI: Update backend image tag to ${{ steps.new_version.outputs.next_version }}"
          git push